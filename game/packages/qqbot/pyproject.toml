[project]
name = "pokemon-nonebot"
version = "1.0.0"
description = "宝可梦文字冒险 QQ机器人 (NoneBot2)"
requires-python = ">=3.10"
dependencies = [
    "nonebot2>=2.3.0",
    "nonebot-adapter-onebot>=2.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.nonebot]
plugin_dirs = ["plugins"]
